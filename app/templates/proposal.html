{% extends 'base.html' %}

{% block title %}Job Proposal - ResumerBot{% endblock %}

{% block content %}
  <h1>Generated Proposal</h1>
  <div class="proposal-meta">
    <p><strong>Generated:</strong> {{ proposal.generated_at }}</p>
    <p><strong>Sending to:</strong> {{ owner_email }}</p>
  </div>

  <div class="proposal-content">
    <pre>{{ proposal.proposal_body }}</pre>
  </div>

  <form method="post" action="{{ url_for('send_proposal') }}" class="send-form">
    <input type="hidden" name="proposal_text" value="{{ proposal.proposal_body }}">
    <input type="hidden" name="owner_email" value="{{ owner_email }}">
    <button type="submit" class="btn-primary">Send Proposal</button>
    <a href="{{ url_for('index') }}" class="btn-secondary">Back</a>
  </form>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Generate Job Proposal - ResumerBot{% endblock %}

{% block content %}
  <h1>Job Proposal Generator</h1>
  <p>Paste a job posting and we'll generate a professional proposal for you.</p>

  <form method="post" action="#">
    <div class="form-group">
      <label for="job_posting">Job Posting</label>
      <textarea id="job_posting" name="job_posting" rows="12" placeholder="Paste the job posting here..." required></textarea>
    </div>

    <div class="form-group">
      <label for="owner_email">Project Owner Email</label>
      <input type="email" id="owner_email" name="owner_email" placeholder="owner@example.com" required>
    </div>

    <button type="submit">Generate Proposal</button>
  </form>
{% endblock %}
